        .modal-btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }
        .modal-btn-secondary:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>

                                    // Remove noise to keep context pure for syntax matching
                                    ['nav', '.md-nav', 'header', '.md-header', 'footer', '.md-footer', 'aside'].forEach(s => {
                                        docObj.querySelectorAll(s).forEach(el => el.remove());
                                    });

                                    const content = docObj.querySelector('article') || docObj.querySelector('.md-content') || docObj.body;
                                    if (content) doc.text = `DOC: ${doc.title}\n${content.innerText.replace(/\s+/g, ' ').trim()}`;
                                }
                            } catch(e) {}
                        }));
                    }
                }

                status.innerText = "SYNTAX SYNCHRONIZED - READY";
                setTimeout(() => { status.style.display = 'none'; }, 2000);
            } catch (e) {
                status.innerText = "OFFLINE MODE";
            }
        }

        function getRelevantContext(query) {
            const stopWords = new Set(['the', 'a', 'an', 'and', 'or', 'but', 'is', 'are', 'was', 'were', 'to', 'for', 'in', 'on', 'at', 'with', 'how', 'do', 'i', 'you', 'can', 'write', 'code', 'bolt', 'using', 'of', 'please', 'make', 'create', 'show', 'me']);
            const getTokens = (t) => t.toLowerCase().match(/[a-zA-Z0-9_.$#\[\]]+/g) || [];
            let tokens = getTokens(query).filter(t => !stopWords.has(t));
            
            if (tokens.length === 0) tokens = getTokens(query);
            if (tokens.length === 0) return "";

            const results = docDatabase.map(doc => {
                let score = 0;
                const docText = doc.text.toLowerCase();
                const docTitle = doc.title.toLowerCase();
                
                tokens.forEach(token => {
                    const escapedToken = token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const hasSymbols = /[^a-zA-Z0-9_]/.test(token);
                    const isNativeSyntax = /let\.|sys\.|\$get|\[\]|nd\b|end\b/i.test(token);

                    // Direct Title Hits
                    if (docTitle === token) score += 1000;
                    else if (docTitle.includes(token)) score += 250;
                    
                    if (hasSymbols || isNativeSyntax) {
                        // Extreme boost for technical symbols to ensure syntax accuracy
                        const count = docText.split(token).length - 1;
                        score += count * 400;
                    } else {
                        // Standard word matching
                        const regex = new RegExp(`\\b${escapedToken}\\b`, 'gi');
                        const matches = docText.match(regex);
                        if (matches) score += matches.length * 70;
                    }
                    
                    // Substring fallback
                    if (docText.includes(token)) score += 15;
                });

                return { score, text: doc.text };
            }).filter(r => r.score > 0);

            results.sort((a, b) => b.score - a.score);
            
            if (results.length === 0) return ""; 
            return results.slice(0, 50).map(r => r.text).join("\n\n---\n\n").substring(0, 50000); // Massive context window
        }

        function saveSessions() {
            if (currentUser) {
                localStorage.setItem(`krix_sessions_${currentUser.uid}`, JSON.stringify(sessions));
            }
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            Object.keys(sessions).reverse().forEach(id => {
                const div = document.createElement('div');
                div.className = `session-item ${id === currentSessionId ? 'active' : ''}`;
                div.innerText = sessions[id].title;
                div.oncontextmenu = (e) => showContextMenu(e, id);
                div.onclick = () => loadSession(id);
                sessionList.appendChild(div);
            });
        }

        function loadSession(id) {
            currentSessionId = id;
            chatDisplay.innerHTML = '';
            welcome.style.display = 'none';
            sessions[id].history.forEach(msg => {
                appendMessage(msg.role, msg.content);
            });
            renderSessionList();
        }

        function startNewChat() {
            currentSessionId = 's' + Date.now();
            sessions[currentSessionId] = { title: "New Chat", history: [] };
            chatDisplay.innerHTML = '';
            chatDisplay.appendChild(welcome);
            welcome.style.display = 'flex';
            renderSessionList();
        }

        // Context Menu Logic
        let menuTargetId = null;
        function showContextMenu(e, id) {
            e.preventDefault();
            menuTargetId = id;
            ctxMenu.style.display = 'block';
            ctxMenu.style.left = e.pageX + 'px';
            ctxMenu.style.top = e.pageY + 'px';
        }

        document.addEventListener('click', () => ctxMenu.style.display = 'none');

        // Custom Modal Logic
        async function showModal(type, message, defaultValue = "") {
            return new Promise((resolve) => {
                const overlay = document.getElementById('modal-overlay');
                const title = document.getElementById('modal-message');
                const input = document.getElementById('modal-input');
                const okBtn = document.getElementById('modal-ok');
                const cancelBtn = document.getElementById('modal-cancel');

                title.innerText = message;
                input.value = defaultValue;
                input.style.display = type === 'prompt' ? 'block' : 'none';
                cancelBtn.style.display = type === 'alert' ? 'none' : 'inline-block';

                overlay.style.display = 'flex';
                if (type === 'prompt') setTimeout(() => input.focus(), 50);

                const cleanup = (val) => {
                    overlay.style.display = 'none';
                    okBtn.onclick = null;
                    cancelBtn.onclick = null;
                    resolve(val);
                };

                okBtn.onclick = () => cleanup(type === 'prompt' ? input.value : true);
                cancelBtn.onclick = () => cleanup(null);
            });
        }

        document.getElementById('menu-rename').onclick = async () => {
            const newTitle = await showModal('prompt', "Enter new title:", sessions[menuTargetId].title);
            if (newTitle) {
                sessions[menuTargetId].title = newTitle;
                renderSessionList();
                saveSessions();
            }
        };

        document.getElementById('id-menu-delete').onclick = async () => {
            if (await showModal('confirm', "Delete this chat?")) {
                delete sessions[menuTargetId];
                if (currentSessionId === menuTargetId) startNewChat();
                else renderSessionList();
                saveSessions();
            }
        };

        async function generateTitle(msg, id) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${HF_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: "system", content: "Generate a 2-3 word title for a chat starting with the user message. Return ONLY title." },
                            { role: "user", content: msg }
                        ],
                        max_tokens: 10
                    })
                });
                const data = await res.json();
                sessions[id].title = data.choices[0].message.content.replace(/["']/g, '');
                renderSessionList();
                saveSessions();
            } catch (e) {}
        }

        function highlightBolt(code) {
            const rules = [
                { name: 'comment', regex: /#.*/g },
                { name: 'string', regex: /"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/g },
                { name: 'module', regex: /\$get\b/g },
                { name: 'keyword', regex: /\b(fn|ret|if|el|esl|else|elif|eif|wh|whl|while|fr|for|br|nx|asm|end|stop|not|nt|or|and|rn|nd|end\.if|end\.fn)\b/gi },
                { name: 'builtin', regex: /\b(let\.userinput|sys\.out|input|len|uniq|alloc|free|memcpy|str|int|float|let\.list\[\]|true|false)\b/g },
                { name: 'number', regex: /\b\d+(\.\d+)?\b/g },
                { name: 'function', regex: /\b[a-zA-Z_]\w*(?=\s*\()/g },
                { name: 'operator', regex: /\+=|-=|\*=|\/=|==|!=|<=|>=|&&|\|\||[+\-*/=!<>%&|^~]/g }
            ];

            let escaped = code.replace(/&/g, "&amp;")
                              .replace(/</g, "&lt;")
                              .replace(/>/g, "&gt;");

            let matches = [];
            rules.forEach(rule => {
                let match;
                rule.regex.lastIndex = 0;
                while ((match = rule.regex.exec(escaped)) !== null) {
                    matches.push({
                        start: match.index,
                        end: match.index + match[0].length,
                        name: rule.name,
                        text: match[0]
                    });
                }
            });

            // Sort by start position, then by length (descending)
            matches.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));

            // Filter overlaps
            let filteredMatches = [];
            let lastEnd = 0;
            for (let match of matches) {
                if (match.start >= lastEnd) {
                    filteredMatches.push(match);
                    lastEnd = match.end;
                }
            }

            // Reconstruct HTML
            let result = "";
            let currentIndex = 0;
            for (let match of filteredMatches) {
                result += escaped.substring(currentIndex, match.start);
                result += `<span class="bolt-${match.name}">${match.text}</span>`;
                currentIndex = match.end;
            }
            result += escaped.substring(currentIndex);

            return result;
        }

        function parseMarkdown(text) {
            let t = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            t = t.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            t = t.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            t = t.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
            t = t.replace(/\*\*\*(.*?)\*\*\*/g, '<b><i>$1</i></b>');
            t = t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            t = t.replace(/\*(.*?)\*/g, '<i>$1</i>');
            t = t.replace(/\n/g, '<br>');
            return t;
        }

        async function appendMessage(role, content, animate = false) {
            if (welcome.parentElement) welcome.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            const roleDiv = document.createElement('div');
            roleDiv.className = `message-role role-${role}`;
            roleDiv.innerText = role === 'assistant' ? 'krix:' : 'You:';
            msgDiv.appendChild(roleDiv);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            msgDiv.appendChild(contentDiv);
            chatDisplay.appendChild(msgDiv);
            
            // Parse code blocks
            const parts = content.split(/(```[\s\S]*?```)/);

            if (!animate) {
                parts.forEach(part => {
                    if (part.startsWith('```')) {
                        const code = part.replace(/```(bolt|javascript|python)?/g, '').replace(/```$/g, '').trim();
                        const lang = part.match(/```(\w+)/)?.[1] || "BOLT";
                        const container = createCodeBlock(code, lang);
                        contentDiv.appendChild(container);
                    } else if (part.trim()) {
                        const p = document.createElement('p');
                        p.innerHTML = parseMarkdown(part);
                        contentDiv.appendChild(p);
                    }
                });
            } else {
                for (let part of parts) {
                    if (part.startsWith('```')) {
                        const code = part.replace(/```(bolt|javascript|python)?/g, '').replace(/```$/g, '').trim();
                        const lang = part.match(/```(\w+)/)?.[1] || "BOLT";
                        const container = createCodeBlock("", lang);
                        const codeElem = container.querySelector('code');
                        contentDiv.appendChild(container);
                        for (let i = 0; i < code.length; i++) {
                            codeElem.innerHTML = highlightBolt(code.substring(0, i + 1));
                            chatDisplay.scrollTo({ top: chatDisplay.scrollHeight, behavior: 'auto' });
                            await new Promise(r => setTimeout(r, 2));
                        }
                        container.querySelector('.copy-btn').onclick = (e) => {
                            navigator.clipboard.writeText(code);
                            e.target.innerText = "Copied!";
                            setTimeout(() => { e.target.innerText = "Copy"; }, 2000);
                        };
                    } else if (part.trim()) {
                        const p = document.createElement('p');
                        contentDiv.appendChild(p);
                        for (let i = 0; i < part.length; i++) {
                            p.innerHTML = parseMarkdown(part.substring(0, i + 1));
                            chatDisplay.scrollTo({ top: chatDisplay.scrollHeight, behavior: 'auto' });
                            await new Promise(r => setTimeout(r, 5));
                        }
                    }
                }
            }
            chatDisplay.scrollTo({ top: chatDisplay.scrollHeight, behavior: 'smooth' });
            return msgDiv;
        }

        function createCodeBlock(code, lang) {
            const container = document.createElement('div');
            container.className = 'code-container';
            container.innerHTML = `
                <div class="code-header">
                    <span class="code-lang">${lang.toUpperCase()}</span>
                    <button class="copy-btn">Copy</button>
                </div>
                <pre><code>${highlightBolt(code)}</code></pre>
            `;
            container.querySelector('.copy-btn').onclick = (e) => {
                const actualCode = container.querySelector('code').textContent;
                navigator.clipboard.writeText(actualCode);
                e.target.innerText = "Copied!";
                setTimeout(() => { e.target.innerText = "Copy"; }, 2000);
            };
            return container;
        }

        function showThinking() {
            const div = document.createElement('div');
            div.id = 'thinking-indicator';
            div.className = 'message';
            div.innerHTML = `
                <div class="message-role role-assistant">krix:</div>
                <div class="thinking-dots">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>`;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        async function handleSend() {
            if (controller) {
                controller.abort();
                return;
            }

            if (!currentUser) {
                let trialCount = parseInt(localStorage.getItem('krix_trial_count') || '0');
                if (trialCount >= 5) {
                    await showModal('alert', "You've reached the 5-message trial limit. Please sign up to continue using Krix.");
                    window.location.href = 'signup.html';
                    return;
                }
            }

            let rawText = promptInput.value.trim();
            if (!rawText) return;

            if (!currentSessionId) startNewChat();

            let hyperActive = false;
            let forcedMode = null;

            if (rawText.toLowerCase().startsWith("/hyper")) {
                rawText = rawText.substring(6).trim();
                if (hyperUsesLeft > 0) {
                    hyperActive = true;
                    hyperUsesLeft--;
                    localStorage.setItem('hyper_uses', hyperUsesLeft);
                }
            } else if (rawText.toLowerCase().startsWith("/code")) {
                rawText = rawText.substring(5).trim();
                forcedMode = "code";
            }

            const mode = hyperActive ? "hyper" : detectMode(rawText, forcedMode);
            
            promptInput.value = '';
            appendMessage('user', rawText);
            sessions[currentSessionId].history.push({ role: 'user', content: rawText });
            
            sendBtn.disabled = true;
            showThinking();

            try {
                controller = new AbortController();
                sendBtn.disabled = false;
                sendBtn.innerText = 'STOP';
                sendBtn.classList.add('stop');

                const context = getRelevantContext(rawText);
                const lengthInstruction = hyperActive 
                    ? `HYPER TOKEN ENABLED. Be detailed. Target 100-1450 chars.` 
                    : `SHORT MODE. Keep natural-language explanations very short (max 500 chars).`;

                const missingFeatureInstruction = context === "" 
                    ? "No specific documentation found for this query. If the user asks for a feature not in your base knowledge, politely deny and say it is not available in documented Bolt."
                    : "Use the provided Bolt documentation as the authoritative reference. Do not invent features.";

                const messages = [
                    { role: "system", content: BASE_SYSTEM_PROMPT },
                    { role: "system", content: getModeInstruction(mode) },
                    { role: "system", content: lengthInstruction },
                    { role: "system", content: missingFeatureInstruction },
                    { role: "system", content: `BOLT DOCUMENTATION CONTEXT:\n${context}` },
                    ...sessions[currentSessionId].history
                ];

                const settings = getGenerationSettings(mode);
                const response = await fetch(API_URL, {
                    method: 'POST',
                    signal: controller.signal,
                    headers: { 'Authorization': `Bearer ${HF_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: MODEL, messages: messages, max_tokens: settings.max_tokens, temperature: settings.temperature })
                });

                const data = await response.json();
                let reply = data.choices[0].message.content;

                document.getElementById('thinking-indicator')?.remove();

                await appendMessage('assistant', reply, true);
                sessions[currentSessionId].history.push({ role: 'assistant', content: reply });
                
                if (sessions[currentSessionId].history.length === 2) {
                    generateTitle(rawText, currentSessionId);
                }

                if (!currentUser) {
                    let trialCount = parseInt(localStorage.getItem('krix_trial_count') || '0');
                    localStorage.setItem('krix_trial_count', trialCount + 1);
                }
                saveSessions();

            } catch (err) {
                document.getElementById('thinking-indicator')?.remove();
                if (err.name === 'AbortError') appendMessage('assistant', "_Generation stopped by user._");
                else appendMessage('assistant', "ERROR: Connection failed.");
            } finally {
                controller = null;
                sendBtn.classList.remove('stop');
                sendBtn.disabled = false;
                sendBtn.innerText = 'SEND';
            }
        }

        // --- Event Listeners ---
        sendBtn.onclick = handleSend;
        promptInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        };
        document.getElementById('new-chat-btn').onclick = startNewChat;

        // Secret Toggle for Delete All Button: Alt + Delete
        window.addEventListener('keydown', (e) => {
            if (e.altKey && e.key === 'Delete') {
                const btn = document.getElementById('clear-all-btn');
                btn.style.display = btn.style.display === 'flex' ? 'none' : 'flex';
            }
        });

        document.getElementById('clear-all-btn').onclick = async () => {
            if (await showModal('confirm', "WARNING: This will permanently delete ALL chat sessions. Are you sure?")) {
                sessions = {};
                saveSessions();
                startNewChat();
            }
        };

        // Init
        loadDocs();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const nameEl = document.getElementById('account-name');
            const btnEl = document.getElementById('signup-btn');

            if (user) {
                const displayName = user.displayName || user.email.split('@')[0];
                nameEl.innerText = displayName;
                btnEl.innerText = "Log Out";
                btnEl.onclick = () => signOut(auth);
                
                // Load user-specific sessions
                sessions = JSON.parse(localStorage.getItem(`krix_sessions_${user.uid}`) || '{}');
            } else {
                nameEl.innerText = "Guest";
                btnEl.innerText = "Sign Up";
                btnEl.onclick = () => window.location.href = 'signup.html';
                
                // Guests get a clean slate (not saved)
                sessions = {};
            }
            renderSessionList();
            startNewChat();
        });
    </script>
</body>
</html>
